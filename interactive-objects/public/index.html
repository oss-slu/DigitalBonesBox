<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Editor View</title>
    <script src="https://unpkg.com/htmx.org"></script>
</head>
<body>
    <h1>Editor View</h1>
    <textarea id="json-editor" rows="10" cols="50"></textarea>
    <br>
    <button id="publish-button" 
            hx-post="/publish" 
            hx-trigger="click" 
            hx-target="#response" 
            hx-vals="{ 'message': 'Updated data' }">Publish Changes</button>
    <div id="response"></div>
</body>
</html>
